<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kalyx TV</title>
<style>
    @font-face {
        font-family: 'Inter';
        src: url('assets/Font/Inter_18pt-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
    }
    @font-face {
        font-family: 'Inter';
        src: url('assets/Font/Inter_18pt-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-style: normal;
    }
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        position: relative;
        background: #ffffff;
    }
    /* SVG Splash Screen Background */
    .splash-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 1;
    }
    /* Content overlaying the background */
    .overlay-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        box-sizing: border-box;
        pointer-events: none;
    }
    .version-tag {
        position: absolute;
        top: 25px;
        right: 40px;
        font-size: 0.95rem;
        color: #0d5d9c; /* matches the theme blue */
        font-weight: 500;
    }
    .log-container {
        position: absolute;
        bottom: 45px;
        right: 40px;
        width: 450px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
        text-align: right;
    }
    .log-line {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 0.72rem;
        color: #3b7ba8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 100%;
        animation: fadeIn 0.1s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    .progress-bar-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 8px;
        background: rgba(0, 0, 0, 0.03);
        z-index: 3;
    }
    .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #01579b;
        transition: width 0.15s ease-out;
    }
</style>
</head>
<body>

<!-- The entire design-integrated SVG splash background -->
<img class="splash-bg" src="assets/Kalyx_splash.svg" alt="Kalyx TV Splash Screen">

<!-- Dynamic details overlaid on top -->
<div class="overlay-content">
    <div id="version-display" class="version-tag">V --</div>
    
    <div class="log-container" id="log-display">
        <!-- Logs write here -->
    </div>
</div>

<!-- Bottom Progress Bar -->
<div class="progress-bar-container">
    <div id="progress-fill" class="progress-bar-fill"></div>
</div>

<script>
const { ipcRenderer } = require('electron');
const fs = require('fs');
const path = require('path');

// 1. Resolve Dynamic App Version
let appVersion = '1.0.0';
try {
    const pkgPath = path.join(__dirname, 'package.json');
    if (fs.existsSync(pkgPath)) {
        const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
        appVersion = pkg.version || '1.0.0';
    }
} catch (err) {
    console.error('Splash: failed to read app version', err);
}
document.getElementById('version-display').textContent = `V ${appVersion}`;

// 2. Simulated Logs matching exactly the screenshot
const startupLogs = [
    "Starting Kalyx TV...",
    "Loading SQLite databases...",
    "media_kit: NativeReferenceHolder: Allocated 2502128404400",
    "Database initialized successfully.",
    "Checking configured playlists...",
    "Awaiting media kit video player initialization...",
    "Playlists loaded: 3 found.",
    "HTTP server started on port 8088",
    "Startup load timeout reached.",
    "media_kit: ANGLESurfaceManager: Direct3D Feature Level: 11_0"
];

const logDisplay = document.getElementById('log-display');
const progressFill = document.getElementById('progress-fill');
let currentLogIndex = 0;
let endedSent = false;

function sendEnded() {
    if (endedSent) return;
    endedSent = true;
    ipcRenderer.send('splash-ended');
}

function renderNextLog() {
    if (currentLogIndex >= startupLogs.length) {
        progressFill.style.width = '100%';
        setTimeout(sendEnded, 2000); // 2s pause to match startup load
        return;
    }
    
    const message = startupLogs[currentLogIndex];
    
    // Add new log line
    const logLine = document.createElement('div');
    logLine.className = 'log-line';
    logLine.textContent = message;
    logDisplay.appendChild(logLine);
    
    // Allow up to 10 lines of logs as shown in the desktop screenshot
    while (logDisplay.childNodes.length > 10) {
        logDisplay.removeChild(logDisplay.firstChild);
    }
    
    // Update progress bar
    const progressPercent = ((currentLogIndex + 1) / startupLogs.length) * 100;
    progressFill.style.width = `${progressPercent}%`;
    
    currentLogIndex++;
    
    // Organic-looking timing for the simulator
    const nextTimeout = currentLogIndex === startupLogs.length - 1 ? 250 : Math.random() * 150 + 100;
    setTimeout(renderNextLog, nextTimeout);
}

// Start simulation
setTimeout(renderNextLog, 300);

// Failsafe exit timer
setTimeout(sendEnded, 8000);
</script>

</body>
</html>
