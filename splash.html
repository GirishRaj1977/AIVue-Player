<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIVue Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
}

#container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#video-container {
    width: 500px;
    height: 500px;
    object-fit: contain;
}

#fallback-image {
    display: none;
    width: 500px;
    height: 500px;
    object-fit: contain;
}
</style>
</head>

<body>

<div id="container">
    <video id="video-container" src="./assets/Splash_1.webm" autoplay loop muted playsinline></video>
    <img id="fallback-image" src="./assets/player.png">
</div>

<script>
const video = document.getElementById('video-container');
const fallback = document.getElementById('fallback-image');

function showFallback(reason) {
    console.error('Splash fallback:', reason);

    video.style.display = 'none';
    fallback.style.display = 'block';
}

video.addEventListener('error', (e) => {
    showFallback('Video failed to load');
});
</script>

</body>
</html>
