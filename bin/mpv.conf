# --- CORE LOW LATENCY ---
profile=low-latency
untimed=yes

# --- GENERAL ---
idle=yes
osc=no
slang=en,eng
panscan=1.0
save-position-on-quit=yes
title-bar=no

# --- SCALING (KEEP LIGHT TO AVOID JERKINESS) ---
scale=bilinear
cscale=bilinear
dscale=bilinear
sws-scaler=bilinear

# --- GPU (safe default) ---
vo=gpu

# --- SCREENSHOTS (BEST POSSIBLE WITHOUT BREAKING LATENCY) ---
screenshot-format=png
screenshot-png-compression=0
screenshot-sw=yes
screenshot-directory="C:\Users\Girish\Pictures"
screenshot-template="%F_%p"